research:
  topic: "AI agent survey automation"
  description: "Investigate tools, workflows, and constraints for automated survey systems."
paths:
  state_dir: "./state"
  knowledge_dir: "./knowledge"
  output_dir: "./outputs"
  local_docs_dir: "./local_docs"
llm:
  provider: "litellm"
  model_map:
    planner: "openai/gpt-4o-mini"
    extractor: "openai/gpt-4o-mini"
    synthesizer: "openai/gpt-4o"
  temperature:
    planner: 0.2
    extractor: 0.0
    synthesizer: 0.3
  timeout_seconds: 1800
  extractor_disable_thinking: true
runtime:
  max_steps_per_run: 3
  max_retry_per_task: 2
  max_tasks: 20
  max_depth: 2
  min_priority: 0.0
  default_priority: 0.7
collection:
  max_web_results: 5
  max_sources_per_task: 8
  chunk_size: 1500
  chunk_overlap: 200
quality:
  claim_confidence_threshold: 0.5
  spawn_confidence_threshold: 0.6
search:
  brave_api_key: ""
  country: "JP"
  search_lang: "ja"
  max_queries_per_task: 3
  retry_attempts: 2
  retry_delay_seconds: 1.0
